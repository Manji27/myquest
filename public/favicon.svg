<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="512" height="14" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="512" y2="0" stroke="#33f7fc" stroke-width="1" opacity="0.05"/>
    </pattern>
    <clipPath id="frameClip">
      <path d="M92 92 H420 V360 L364 416 H92 Z"/>
    </clipPath>
  </defs>

  <!-- fond tech nocturne -->
  <rect width="512" height="512" fill="#060e13"/>
  <rect width="512" height="512" fill="url(#scan)"/>

  <!-- lueur interne du cadre -->
  <path d="M92 92 H420 V360 L364 416 H92 Z" fill="#0d1b22" clip-path="url(#frameClip)"/>

  <!-- tirets jaune acide en haut (écho « mission active ») -->
  <g fill="#ffd640">
    <rect x="116" y="86" width="26" height="8"/>
    <rect x="152" y="86" width="26" height="8"/>
    <rect x="188" y="86" width="26" height="8"/>
    <rect x="224" y="86" width="26" height="8"/>
  </g>

  <!-- cadre à coin coupé (motif des cartes de contrat) -->
  <path d="M92 92 H420 V360 L364 416 H92 Z" fill="none" stroke="#33f7fc" stroke-width="9" filter="url(#glow)"/>
  <!-- accent rouge sur le flanc gauche -->
  <rect x="92" y="92" width="9" height="324" fill="#ff5b53"/>

  <!-- diamant néon central (glyphe de la nav) -->
  <g filter="url(#glow)">
    <path d="M256 168 L344 256 L256 344 L168 256 Z" fill="none" stroke="#33f7fc" stroke-width="13"/>
    <path d="M256 214 L298 256 L256 298 L214 256 Z" fill="#33f7fc"/>
  </g>
</svg>
